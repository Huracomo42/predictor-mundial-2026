<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial — Predictor Mundial 2026</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <div class="nav-logo">
      <span class="logo-icon">⚽</span>
      <span class="logo-text">Predictor</span>
      <span class="logo-sub">Mundial 2026</span>
    </div>
    <div class="nav-center">
      <a href="index.html" class="nav-link">Dashboard</a>
      <a href="analisis.html" class="nav-link">Analizar partido</a>
      <a href="historial.html" class="nav-link active">Historial</a>
      <a href="calibrador.html" class="nav-link">Calibrador</a>
    </div>
    <div class="nav-right">
      <div class="nav-stat">
        <span class="nav-stat-val" id="precision-global">—</span>
        <span class="nav-stat-label">Precisión</span>
      </div>
      <span class="nav-badge">Modelo v1.0</span>
    </div>
  </div>
</nav>

<main class="main">

  <div class="page-header">
    <div>
      <h1 class="page-title">Historial y backtest</h1>
      <p class="page-sub">Predicciones guardadas vs resultados reales</p>
    </div>
    <div class="filter-bar">
      <select id="filter-tipo" onchange="filtrarHistorial()">
        <option value="todos">Todos los tipos</option>
        <option value="segura">Seguras</option>
        <option value="media">Medias</option>
        <option value="malcriada">Malcriadas</option>
      </select>
      <select id="filter-resultado" onchange="filtrarHistorial()">
        <option value="todos">Todos</option>
        <option value="acierto">Aciertos</option>
        <option value="fallo">Fallos</option>
        <option value="pendiente">Pendientes</option>
      </select>
    </div>
  </div>

  <div class="precision-strip">
    <div class="precision-card green">
      <div class="precision-pct" id="pct-seguras">—</div>
      <div class="precision-label">Seguras</div>
      <div class="precision-bar-bg">
        <div class="precision-bar-fill green" id="fill-seguras"></div>
      </div>
      <div class="precision-count" id="count-seguras">0/0</div>
    </div>
    <div class="precision-card blue">
      <div class="precision-pct" id="pct-medias">—</div>
      <div class="precision-label">Medias</div>
      <div class="precision-bar-bg">
        <div class="precision-bar-fill blue" id="fill-medias"></div>
      </div>
      <div class="precision-count" id="count-medias">0/0</div>
    </div>
    <div class="precision-card amber">
      <div class="precision-pct" id="pct-malcriadas">—</div>
      <div class="precision-label">Malcriadas</div>
      <div class="precision-bar-bg">
        <div class="precision-bar-fill amber" id="fill-malcriadas"></div>
      </div>
      <div class="precision-count" id="count-malcriadas">0/0</div>
    </div>
    <div class="precision-card purple">
      <div class="precision-pct" id="ev-promedio">—</div>
      <div class="precision-label">EV promedio</div>
      <div class="precision-bar-bg">
        <div class="precision-bar-fill purple" id="fill-ev"></div>
      </div>
      <div class="precision-count" id="count-total">0 partidos</div>
    </div>
  </div>

  <section class="section">
    <div class="section-header">
      <span class="section-title">Partidos analizados</span>
      <span class="section-sub" id="historial-count">—</span>
    </div>
    <div id="historial-container">
      <div class="loading-state">
        <div class="spinner"></div>
        <span>Cargando historial...</span>
      </div>
    </div>
  </section>

  <div id="modal-resultado" class="modal" style="display:none">
    <div class="modal-backdrop" onclick="cerrarModal()"></div>
    <div class="modal-card">
      <div class="modal-header">
        <span class="modal-title" id="modal-titulo">Ingresar resultado</span>
        <button class="modal-close" onclick="cerrarModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="result-input-group">
          <label>Goles <span id="modal-local">Local</span></label>
          <input type="number" id="goles-local" min="0" max="20" value="0">
        </div>
        <div class="result-input-group">
          <label>Goles <span id="modal-visitante">Visitante</span></label>
          <input type="number" id="goles-visitante" min="0" max="20" value="0">
        </div>
        <div class="result-input-group">
          <label>Corners totales</label>
          <input type="number" id="corners-reales" min="0" max="30" value="0">
        </div>
        <div class="result-input-group">
          <label>Tarjetas amarillas visitante</label>
          <input type="number" id="amarillas-visitante" min="0" max="10" value="0">
        </div>
        <div class="result-input-group">
          <label>xG real local (opcional)</label>
          <input type="number" id="xg-local-real" min="0" max="5" step="0.01" placeholder="0.00">
        </div>
        <div class="result-input-group">
          <label>xG real visitante (opcional)</label>
          <input type="number" id="xg-visitante-real" min="0" max="5" step="0.01" placeholder="0.00">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-primary" onclick="guardarResultado()">Guardar resultado</button>
      </div>
    </div>
  </div>

</main>

<script type="module" src="js/firebase-init.js"></script>
<script type="module" src="js/historial.js"></script>
</body>
</html>
